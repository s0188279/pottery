<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гончарная мастерская «Глина» (Багованная версия)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .phone-container { max-width: 412px; min-height: 844px; }
    </style>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen text-gray-100 font-sans p-4">

    <div class="phone-container w-full bg-gray-800 rounded-3xl shadow-2xl border-4 border-gray-700 overflow-hidden flex flex-col relative">
        
        <div class="bg-gray-800 text-xs px-6 py-2 flex justify-between items-center text-gray-400 border-b border-gray-700 select-none">
            <span>18:45</span>
            <div class="flex space-x-1"><span>LTE</span><span>🔋 88%</span></div>
        </div>

        <div id="app-content" class="flex-1 p-5 overflow-y-auto flex flex-col justify-between">
            </div>
    </div>

    <script>
        const MOCK_SLOTS = [
            { id: "slot-1", title: "Новичковый круг", type: "KRUG", master: "Мастер Иван", time: "Завтра, 12:00 - 14:30", price: 2500, total_seats: 6, free_seats: 4 },
            { id: "slot-2", title: "Простая лепка для новичков", type: "LEPKA", master: "Мастер Дарья", time: "Вторник, 15:00 - 17:00", price: 1800, total_seats: 6, free_seats: 1 },
            { id: "slot-3", title: "Продвинутый круг", type: "KRUG", master: "Мастер Иван", time: "Четверг, 18:30 - 21:00", price: 3000, total_seats: 10, free_seats: 0 }
        ];

        let state = {
            currentScreen: 'auth', 
            userPhone: '',
            selectedSlot: null,
            needsRent: false
        };

        function render() {
            const container = document.getElementById('app-content');
            container.innerHTML = '';

            if (state.currentScreen === 'auth') {
                container.innerHTML = `
                    <div class="my-auto text-center">
                        <h1 class="text-3xl font-bold text-amber-500 mb-2">ГЛИНА</h1>
                        <p class="text-gray-400 text-sm mb-8">Мобильное приложение студии</p>
                        
                        <div class="mb-4 text-left">
                            <label class="block text-xs uppercase text-gray-400 mb-1 font-semibold">Номер телефона</label>
                            <input id="auth-phone" type="tel" placeholder="+7 (999) 999-99-99" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500">
                        </div>

                        <div class="mb-6 text-left">
                            <label class="block text-xs uppercase text-gray-400 mb-1 font-semibold">SMS-код (Тест: 1111)</label>
                            <input id="auth-code" type="text" maxlength="4" placeholder="0000" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 text-center tracking-widest text-xl font-bold text-white focus:outline-none focus:border-amber-500">
                        </div>

                        <button onclick="handleLogin()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 px-4 rounded-xl transition-colors">
                            Войти
                        </button>
                    </div>
                `;
            } 
            
            else if (state.currentScreen === 'schedule') {
                let slotsHtml = MOCK_SLOTS.map(slot => {
                    const isFull = slot.free_seats === 0;
                    return `
                        <div class="bg-gray-700/50 border border-gray-700 rounded-2xl p-4 mb-4 flex flex-col justify-between ${isFull ? 'opacity-60' : ''}">
                            <div>
                                <div class="flex justify-between items-start mb-1">
                                    <h3 class="font-bold text-lg text-amber-100">${slot.title}</h3>
                                    <span class="text-xs bg-gray-800 text-gray-400 px-2 py-1 rounded-md font-mono">${slot.type}</span>
                                </div>
                                <p class="text-sm text-gray-300 mb-1">👤 ${slot.master}</p>
                                <p class="text-xs text-gray-400 mb-3">📅 ${slot.time}</p>
                            </div>
                            <div class="flex justify-between items-center pt-2 border-t border-gray-700/50">
                                <div>
                                    <p class="text-xs text-gray-400">Мест: <span class="font-bold ${slot.free_seats <= 1 ? 'text-red-400' : 'text-green-400'}">${slot.free_seats}/${slot.total_seats}</span></p>
                                    <p class="text-md font-bold text-amber-500">${slot.price} ₽</p>
                                </div>
                                ${isFull 
                                    ? `<button disabled class="bg-gray-800 text-gray-500 font-semibold py-2 px-4 rounded-xl text-sm cursor-not-allowed">Мест нет</button>`
                                    : `<button onclick="selectSlot('${slot.id}')" class="bg-amber-600 hover:bg-amber-500 text-white font-semibold py-2 px-4 rounded-xl text-sm transition-colors">Запись</button>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = `
                    <div class="w-full">
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <h2 class="text-xl font-bold">Ближайшие занятия</h2>
                                <p class="text-xs text-gray-400">Расписание на 7 дней вперед</p>
                            </div>
                            <span class="bg-amber-900/40 text-amber-400 text-xs font-bold px-3 py-1 rounded-full border border-amber-800/50">👑 Постоянный client</span>
                        </div>
                        <div class="slots-container">${slotsHtml}</div>
                    </div>
                `;
            } 
            
            else if (state.currentScreen === 'booking') {
                container.innerHTML = `
                    <div class="w-full flex flex-col justify-between h-full">
                        <div>
                            <button onclick="changeScreen('schedule')" class="text-sm text-gray-400 mb-4 flex items-center hover:text-white">← Назад к расписанию</button>
                            <h2 class="text-2xl font-bold mb-4">Оформление записи</h2>
                            
                            <div class="bg-gray-700/30 border border-gray-700 rounded-2xl p-4 mb-6">
                                <h3 class="font-bold text-lg text-amber-400">${state.selectedSlot.title}</h3>
                                <p class="text-sm mt-1">👤 ${state.selectedSlot.master}</p>
                                <p class="text-sm text-gray-300">📅 ${state.selectedSlot.time}</p>
                                <p class="text-lg font-bold mt-2 text-white">${state.selectedSlot.price} ₽</p>
                            </div>

                            <div class="bg-gray-700/50 rounded-2xl p-4 flex items-center justify-between border border-gray-600">
                                <div class="pr-2">
                                    <label for="rent-checkbox" class="font-bold text-sm block cursor-pointer">Прокат инвентаря</label>
                                    <span class="text-xs text-gray-400 block">Инструменты и защитный фартук</span>
                                </div>
                                <input id="rent-checkbox" type="checkbox" ${state.needsRent ? 'checked' : ''} onchange="state.needsRent = this.checked" class="w-5 h-5 accent-amber-500 rounded cursor-pointer">
                            </div>
                        </div>

                        <button onclick="confirmBooking()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3.5 px-4 rounded-xl mt-8 transition-colors">
                            Подтвердить запись
                        </button>
                    </div>
                `;
            } 
            
            else if (state.currentScreen === 'success') {
                container.innerHTML = `
                    <div class="my-auto text-center p-4">
                        <div class="w-16 h-16 bg-green-900/50 text-green-400 border border-green-500 rounded-full flex justify-center items-center text-3xl mx-auto mb-4">✓</div>
                        <h2 class="text-2xl font-bold text-white mb-2">Вы успешно записаны!</h2>
                        <p class="text-gray-400 text-sm mb-6">Ждем вас в мастерской. Информация о прокате передана мастеру.</p>
                        
                        <div class="bg-gray-700/40 border border-gray-700 rounded-xl p-3 text-left mb-8 text-xs text-gray-300 space-y-1">
                            <p><strong>Занятие:</strong> ${state.selectedSlot.title}</p>
                            <p><strong>Время:</strong> ${state.selectedSlot.time}</p>
                            <p><strong>Прокат:</strong> ${state.needsRent ? 'Включен' : 'Не требуется'}</p>
                        </div>

                        <button onclick="resetApp()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 px-4 rounded-xl transition-colors">
                            Вернуться к расписанию
                        </button>
                    </div>
                `;
            }
        }

        function changeScreen(screen) {
            state.currentScreen = screen;
            render();
        }

        function handleLogin() {
            const phone = document.getElementById('auth-phone').value;
            const code = document.getElementById('auth-code').value;
        
            // ИСПРАВЛЕНИЕ: Добавили валидацию телефона
            if(!phone || phone.trim().length < 10) {
                alert("Ошибка: Введите корректный номер телефона!");
                return;
            }
        
            if (code === '1111') {
                state.userPhone = phone;
                changeScreen('schedule');
            } else {
                alert("Ошибка: Неверный SMS-код! Введите '1111' для теста.");
            }
        }

        function selectSlot(slotId) {
            const slot = MOCK_SLOTS.find(s => s.id === slotId);
            if (slot && slot.free_seats > 0) {
                state.selectedSlot = slot;
                state.needsRent = false;
                changeScreen('booking');
            }
        }

        function confirmBooking() {
            changeScreen('success');
        }

        function resetApp() {
            state.selectedSlot = null;
            state.needsRent = false;
            changeScreen('schedule');
        }

        render();
    </script>
</body>
</html>
